name: Integration Tests

on:
  workflow_call:
    inputs:
      qemu_bin:
        description: "Path to the QEMU binary (relative to workspace root)"
        required: false
        type: string
        default: "qemu-system-x86_64"
      accel:
        description: "Accelerator to use (kvm or mshv)"
        required: false
        type: string
        default: "kvm"
      test_filter:
        description: "Test filter (e.g. 'kernel_boot', 'migration_os'). Empty runs default tests."
        required: false
        type: string
      test_jobs:
        description: "Number of parallel test jobs"
        required: false
        type: number
        default: 2
      runs_on:
        description: "Runner label (e.g. 'ubuntu-24.04' or a self-hosted label)"
        required: false
        type: string
        default: "ubuntu-24.04"
      skip_deps:
        description: "Whether to skip installing dependencies (e.g. for self-hosted runners with pre-installed dependencies)"
        required: false
        type: boolean
        default: false

jobs:
  test:
    runs-on: ${{ inputs.runs_on }}
    steps:
      - name: Checkout test framework
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false

      - name: Install dependencies
        if: ${{ !inputs.skip_deps }}
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm qemu-system-x86 wget mtools

      - name: Check dependencies
        run: make check-tools

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4

      - name: Run tests
        env:
          ACCEL: ${{ inputs.accel }}
          QEMU_BIN: ${{ inputs.qemu_bin }}
          TEST_FILTER: ${{ inputs.test_filter }}
          TEST_JOBS: ${{ inputs.test_jobs }}
        run: |
          if [ -z "$TEST_FILTER" ]; then
            unset TEST_FILTER
          fi
          sudo -E env "PATH=$PATH" make run-release

      - name: Run os migration tests
        run: |
          sudo make setup-bridge NUM_TAPS=4
          sudo -E env "PATH=$PATH" make run-release TEST_FILTER=migration_os
